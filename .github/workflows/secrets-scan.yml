name: Secrets Scan

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded credentials
        run: |
          # Fail if any .env file is committed (except .env.example)
          if git ls-files | grep -E '\.env$' | grep -v '\.env\.example$' | grep -v '\.env\.backup'; then
            echo "ERROR: Committed .env files detected. Remove them and use GitHub Secrets instead."
            exit 1
          fi

          # Fail if hardcoded org IDs or secret keys are found in JS files
          if grep -rn "zpneef0a5ov732c0\|erflpo0e4pg33h85v58v7cfvpd6eoycv" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v "\.env\."; then
            echo "ERROR: Hardcoded credentials found in source files. Move them to environment variables."
            exit 1
          fi

          echo "Secrets scan passed."
