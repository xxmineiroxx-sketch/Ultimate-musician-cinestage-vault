name: EAS Build — Ultimate Playback

on:
  push:
    branches: [main]
    paths:
      - 'apps/ultimate_playback/**'
      - 'config/**'
      - '.github/workflows/eas-build-playback.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ultimate_playback/**'
      - 'config/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ultimate_playback
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/ultimate_playback/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --ext .js,.jsx || true

      - name: Validate imports (smoke test)
        run: |
          node -e "require('fs').readFileSync('App.js','utf8')" && echo "App.js parses OK"

      - name: Build (iOS preview)
        if: github.ref == 'refs/heads/main'
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_PUBLIC_SYNC_URL: ${{ secrets.EXPO_PUBLIC_SYNC_URL }}
          EXPO_PUBLIC_CINESTAGE_URL: ${{ secrets.EXPO_PUBLIC_CINESTAGE_URL }}
          EXPO_PUBLIC_SYNC_ORG_ID: ${{ secrets.EXPO_PUBLIC_SYNC_ORG_ID }}
          EXPO_PUBLIC_SYNC_SECRET_KEY: ${{ secrets.EXPO_PUBLIC_SYNC_SECRET_KEY }}

      - name: Build (Android preview)
        if: github.ref == 'refs/heads/main'
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_SYNC_URL: ${{ secrets.EXPO_PUBLIC_SYNC_URL }}
          EXPO_PUBLIC_CINESTAGE_URL: ${{ secrets.EXPO_PUBLIC_CINESTAGE_URL }}
          EXPO_PUBLIC_SYNC_ORG_ID: ${{ secrets.EXPO_PUBLIC_SYNC_ORG_ID }}
          EXPO_PUBLIC_SYNC_SECRET_KEY: ${{ secrets.EXPO_PUBLIC_SYNC_SECRET_KEY }}
